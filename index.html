<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Café Français</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script defer src="main.js"></script></head>
<body>
    <header>
        <h1>Le Café Français</h1>
        <nav>
            <button data-page="home">Home</button>
            <button data-page="menu">Menu</button>
            <button data-page="contact">Contact</button>
            
            <!-- Cart Button -->
            <button id="cart-btn" style="margin-left: auto; background: #c89b6d; color: #121212;">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count">0</span>
            </button>
        </nav>
    </header>

    <div id="content"></div>

    <!-- Chatbot -->
<div id="chatbot-container">
  <div id="chat-toggle" class="chat-toggle">
    💬
  </div>
  
  <div id="chat-window" class="chat-window hidden">
    <div class="chat-header">
      <h3>Chat with our Café Français Assistant</h3>
      <button id="close-chat">✕</button>
    </div>
    <div id="chat-messages"></div>
    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Ask about menu, hours, reservation...">
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>

</body>
</html>
